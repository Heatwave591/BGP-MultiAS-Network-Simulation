! R2 - AS 100 ASBR1 (faces AS 200 Customer)
! Loopback: 10.0.0.2/32
!
hostname R2-AS100-ASBR1
!
interface Loopback0
 ip address 10.0.0.2 255.255.255.255
 no shutdown
!
interface GigabitEthernet0/0
 description iBGP uplink to R1-RR
 ip address 10.1.12.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description eBGP to R4-AS200-Customer
 ip address 172.16.24.1 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 10.0.0.2
 network 10.0.0.2 0.0.0.0 area 0
 network 10.1.12.0 0.0.0.3 area 0
 ! Do NOT advertise eBGP-facing link into OSPF
!
ip prefix-list AS200-IN seq 10 permit 192.168.200.0/24
ip prefix-list AS200-IN seq 20 deny 0.0.0.0/0 le 32
!
ip prefix-list AS100-OUT seq 10 permit 10.0.0.0/16
ip prefix-list AS100-OUT seq 20 deny 0.0.0.0/0 le 32
!
route-map SET-LP-AS200 permit 10
 match ip address prefix-list AS200-IN
 set local-preference 150
!
route-map ADVERTISE-TO-AS200 permit 10
 match ip address prefix-list AS100-OUT
!
router bgp 100
 bgp router-id 10.0.0.2
 bgp log-neighbor-changes
 !
 ! iBGP to Route Reflector
 neighbor 10.0.0.1 remote-as 100
 neighbor 10.0.0.1 description iBGP to R1-RR
 neighbor 10.0.0.1 update-source Loopback0
 !
 ! eBGP to AS 200 Customer
 neighbor 172.16.24.2 remote-as 200
 neighbor 172.16.24.2 description eBGP to R4-AS200
 !
 address-family ipv4
  neighbor 10.0.0.1 activate
  neighbor 172.16.24.2 activate
  neighbor 172.16.24.2 route-map SET-LP-AS200 in
  neighbor 172.16.24.2 route-map ADVERTISE-TO-AS200 out
  neighbor 172.16.24.2 send-community
 exit-address-family
!
end
