! R5 - AS 300 Peer ISP Router
!
hostname R5-AS300-PeerISP
!
interface Loopback0
 ip address 192.168.300.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0
 description eBGP to R3-AS100-ASBR2
 ip address 172.16.35.2 255.255.255.252
 no shutdown
!
ip prefix-list MY-PREFIXES seq 10 permit 192.168.300.0/24
ip prefix-list MY-PREFIXES seq 20 deny 0.0.0.0/0 le 32
!
router bgp 300
 bgp router-id 192.168.300.1
 bgp log-neighbor-changes
 !
 neighbor 172.16.35.1 remote-as 100
 neighbor 172.16.35.1 description eBGP to R3-AS100
 !
 address-family ipv4
  neighbor 172.16.35.1 activate
  network 192.168.300.0 mask 255.255.255.0
  neighbor 172.16.35.1 route-map EXPORT-ONLY out
 exit-address-family
!
route-map EXPORT-ONLY permit 10
 match ip address prefix-list MY-PREFIXES
!
end
