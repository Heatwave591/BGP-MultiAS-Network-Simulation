! R3 - AS 100 ASBR2 (faces AS 300 Peer ISP)
! Loopback: 10.0.0.3/32
!
hostname R3-AS100-ASBR2
!
interface Loopback0
 ip address 10.0.0.3 255.255.255.255
 no shutdown
!
interface GigabitEthernet0/0
 description iBGP uplink to R1-RR
 ip address 10.1.13.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description eBGP to R5-AS300-PeerISP
 ip address 172.16.35.1 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 10.0.0.3
 network 10.0.0.3 0.0.0.0 area 0
 network 10.1.13.0 0.0.0.3 area 0
!
ip prefix-list AS300-IN seq 10 permit 192.168.300.0/24
ip prefix-list AS300-IN seq 20 deny 0.0.0.0/0 le 32
!
ip prefix-list AS100-OUT seq 10 permit 10.0.0.0/16
ip prefix-list AS100-OUT seq 20 deny 0.0.0.0/0 le 32
!
! Lower LOCAL_PREF for peer (prefer customer traffic via R2)
route-map SET-LP-AS300 permit 10
 match ip address prefix-list AS300-IN
 set local-preference 100
!
route-map ADVERTISE-TO-AS300 permit 10
 match ip address prefix-list AS100-OUT
!
router bgp 100
 bgp router-id 10.0.0.3
 bgp log-neighbor-changes
 !
 neighbor 10.0.0.1 remote-as 100
 neighbor 10.0.0.1 description iBGP to R1-RR
 neighbor 10.0.0.1 update-source Loopback0
 !
 neighbor 172.16.35.2 remote-as 300
 neighbor 172.16.35.2 description eBGP to R5-AS300
 !
 address-family ipv4
  neighbor 10.0.0.1 activate
  neighbor 172.16.35.2 activate
  neighbor 172.16.35.2 route-map SET-LP-AS300 in
  neighbor 172.16.35.2 route-map ADVERTISE-TO-AS300 out
  neighbor 172.16.35.2 send-community
 exit-address-family
!
end
