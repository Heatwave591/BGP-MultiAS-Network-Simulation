! R1 - AS 100 Route Reflector
! Loopback: 10.0.0.1/32
!
hostname R1-AS100-RR
!
interface Loopback0
 ip address 10.0.0.1 255.255.255.255
 no shutdown
!
interface GigabitEthernet0/0
 description Link to R2-ASBR1
 ip address 10.1.12.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description Link to R3-ASBR2
 ip address 10.1.13.1 255.255.255.252
 no shutdown
!
! OSPF for IGP reachability within AS 100
router ospf 1
 router-id 10.0.0.1
 network 10.0.0.1 0.0.0.0 area 0
 network 10.1.12.0 0.0.0.3 area 0
 network 10.1.13.0 0.0.0.3 area 0
!
router bgp 100
 bgp router-id 10.0.0.1
 bgp log-neighbor-changes
 !
 ! iBGP neighbors using loopbacks (Route Reflector clients)
 neighbor 10.0.0.2 remote-as 100
 neighbor 10.0.0.2 description iBGP to R2-ASBR1
 neighbor 10.0.0.2 update-source Loopback0
 neighbor 10.0.0.2 route-reflector-client
 !
 neighbor 10.0.0.3 remote-as 100
 neighbor 10.0.0.3 description iBGP to R3-ASBR2
 neighbor 10.0.0.3 update-source Loopback0
 neighbor 10.0.0.3 route-reflector-client
 !
 address-family ipv4
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.3 activate
  ! Originate a summary into BGP
  network 10.0.0.0 mask 255.255.0.0
 exit-address-family
!
end
