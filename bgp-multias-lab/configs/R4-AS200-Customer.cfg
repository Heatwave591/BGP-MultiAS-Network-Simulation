! R4 - AS 200 Customer Router
!
hostname R4-AS200-Customer
!
interface Loopback0
 ip address 192.168.200.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0
 description eBGP to R2-AS100-ASBR1
 ip address 172.16.24.2 255.255.255.252
 no shutdown
!
ip prefix-list MY-PREFIXES seq 10 permit 192.168.200.0/24
ip prefix-list MY-PREFIXES seq 20 deny 0.0.0.0/0 le 32
!
router bgp 200
 bgp router-id 192.168.200.1
 bgp log-neighbor-changes
 !
 neighbor 172.16.24.1 remote-as 100
 neighbor 172.16.24.1 description eBGP to R2-AS100
 !
 address-family ipv4
  neighbor 172.16.24.1 activate
  network 192.168.200.0 mask 255.255.255.0
  neighbor 172.16.24.1 route-map EXPORT-ONLY out
 exit-address-family
!
route-map EXPORT-ONLY permit 10
 match ip address prefix-list MY-PREFIXES
!
end
